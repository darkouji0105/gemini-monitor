name: Gemini API 日次レポート

on:
  schedule:
    # 毎晩 21:00 JST = 12:00 UTC
    - cron: "0 12 * * *"

  # Actions タブから手動実行も可能
  workflow_dispatch:

jobs:
  daily-report:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      # ── 前日の使用量を記録した state.json をキャッシュから復元 ──
      - name: state.json をキャッシュから復元
        uses: actions/cache@v4
        with:
          path: state.json
          key: gemini-state-${{ runner.os }}
          # キャッシュがなくても失敗しない（初回は空スタート）
          restore-keys: gemini-state-

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 依存ライブラリをインストール
        run: pip install google-auth google-auth-httplib2 requests

      - name: 日次レポートを実行
        env:
          DISCORD_WEBHOOK:     ${{ secrets.DISCORD_WEBHOOK }}
          BILLING_ACCOUNT_ID:  ${{ secrets.BILLING_ACCOUNT_ID }}
          BUDGET_ID:           ${{ secrets.BUDGET_ID }}
          GCP_SA_JSON:         ${{ secrets.GCP_SA_JSON }}
          TOTAL_CREDITS:       ${{ vars.TOTAL_CREDITS }}
          ALERT_THRESHOLD_PCT: ${{ vars.ALERT_THRESHOLD_PCT }}
        run: python debug.py

      # ── 実行後の state.json をキャッシュに保存（次回の「今日の使用額」計算に使う）──
      - name: state.json をキャッシュに保存
        uses: actions/cache/save@v4
        if: always()  # スクリプトが失敗しても保存を試みる
        with:
          path: state.json
          key: gemini-state-${{ runner.os }}-${{ github.run_id }}
