name: Gemini API 日次レポート

on:
  schedule:
    - cron: "0 12 * * *"
  workflow_dispatch:

jobs:
  daily-report:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: state.json をキャッシュから復元
        uses: actions/cache@v4
        with:
          path: state.json
          key: gemini-state-${{ runner.os }}
          restore-keys: gemini-state-

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 依存ライブラリをインストール
        run: pip install google-auth google-auth-httplib2 requests

      # ---- Google Cloud 認証（公式アクション）----
      - id: auth
        name: Google Cloud 認証
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_JSON }}

      - name: gcloud セットアップ
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ steps.auth.outputs.project_id }}

      # ---- 診断1: API 有効化チェック ----
      - name: API 有効化状態を確認
        run: |
          gcloud services list --enabled --filter="billingbudgets.googleapis.com" | grep -q billingbudgets || \
          ( echo "::error::❌ Cloud Billing Budgets API が無効です" && exit 1 )

      # ---- 診断2: 権限チェック（バジェット一覧） ----
      - name: バジェット一覧を取得（権限テスト）
        env:
          BILLING_ACCOUNT_ID: ${{ secrets.BILLING_ACCOUNT_ID }}
        run: |
          gcloud beta billing budgets list --billing-account="$BILLING_ACCOUNT_ID" || \
          ( echo "::error::❌ 権限不足 - roles/billing.viewer を付与してください" && exit 1 )

      # ---- 診断3: 指定バジェットの存在確認 ----
      - name: 特定バジェットを取得
        env:
          BILLING_ACCOUNT_ID: ${{ secrets.BILLING_ACCOUNT_ID }}
          BUDGET_ID: ${{ secrets.BUDGET_ID }}
        run: |
          gcloud beta billing budgets describe "$BUDGET_ID" --billing-account="$BILLING_ACCOUNT_ID" || \
          ( echo "::error::❌ BUDGET_ID が存在しないかアクセス不可" && exit 1 )

      # ---- 本実行 ----
      - name: 日次レポートを実行
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          BILLING_ACCOUNT_ID: ${{ secrets.BILLING_ACCOUNT_ID }}
          BUDGET_ID: ${{ secrets.BUDGET_ID }}
          GCP_SA_JSON: ${{ secrets.GCP_SA_JSON }}
          TOTAL_CREDITS: ${{ vars.TOTAL_CREDITS }}
          ALERT_THRESHOLD_PCT: ${{ vars.ALERT_THRESHOLD_PCT }}
        run: python debug.py

      - name: state.json をキャッシュに保存
        uses: actions/cache/save@v4
        if: always()
        with:
          path: state.json
          key: gemini-state-${{ runner.os }}-${{ github.run_id }}
