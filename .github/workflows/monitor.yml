name: Gemini API 日次レポート

on:
  schedule:
    - cron: "0 12 * * *"
  workflow_dispatch:

jobs:
  daily-report:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: state.json をキャッシュから復元
        uses: actions/cache@v4
        with:
          path: state.json
          key: gemini-state-${{ runner.os }}
          restore-keys: gemini-state-

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 依存ライブラリをインストール
        run: |
          pip install google-auth google-auth-httplib2 requests google-cloud-monitoring

      - name: 日次レポートを実行
        env:
          DISCORD_WEBHOOK:     ${{ secrets.DISCORD_WEBHOOK }}
          PROJECT_ID:          ${{ secrets.PROJECT_ID }}   # 追加のシークレット
          GCP_SA_JSON:         ${{ secrets.GCP_SA_JSON }}
          TOTAL_CREDITS:       ${{ vars.TOTAL_CREDITS }}
          ALERT_THRESHOLD_PCT: ${{ vars.ALERT_THRESHOLD_PCT }}
        run: python debug.py

      - name: state.json をキャッシュに保存
        uses: actions/cache/save@v4
        if: always()
        with:
          path: state.json
          key: gemini-state-${{ runner.os }}-${{ github.run_id }}
